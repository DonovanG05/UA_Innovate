<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Activity History — Coca-Cola Rewards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; padding-bottom: 80px; font-family: 'Quicksand', sans-serif; }
    .nav-bottom { background: white; border-top: 1px solid #dee2e6; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
    .nav-bottom .nav-link { color: #6c757d; font-size: 0.75rem; text-align: center; }
    .nav-bottom .nav-link.active { color: #F40009; font-weight: bold; }
    
    .history-card { border: none; border-radius: 16px; overflow: hidden; }
    .badge-earn { background: #d1e7dd; color: #0f5132; }
    .badge-redeem { background: #f8d7da; color: #842029; }
    .x-small { font-size: 0.7rem; }
    .month-section { margin-bottom: 1.5rem; }
    .month-header {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0 0.6rem; margin-bottom: 0.25rem;
      border-bottom: 2px solid rgba(244,0,9,0.2);
      font-weight: 700; font-size: 0.95rem; color: #4a4a4a;
    }
    .month-header .month-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #F40009, #c00);
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .month-header .month-icon svg { width: 18px; height: 18px; }
    .month-items .list-group-item { border-radius: 10px; margin-bottom: 0.35rem; }
    .month-items .list-group-item:last-child { margin-bottom: 0; }
    .month-header { cursor: pointer; user-select: none; }
    .month-header:hover { opacity: 0.9; }
    .month-header .month-chevron {
      margin-left: auto; transition: transform 0.2s ease;
    }
    .month-header.collapsed .month-chevron { transform: rotate(-90deg); }
    .month-section .month-items.collapsed { display: none; }
  </style>
</head>
<body>
  <div class="container-fluid px-4 py-3">
    <div class="d-flex align-items-center mb-4">
      <a href="index.html" class="text-dark me-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
      </a>
      <h5 class="fw-bold mb-0">Activity History</h5>
    </div>

    <div class="card history-card shadow-sm mb-4">
      <div class="card-body p-0">
        <div id="historyList" class="list-group list-group-flush p-3">
          <div class="text-center py-5">
            <div class="spinner-border text-danger spinner-border-sm" role="status"></div>
            <p class="small text-muted mt-2">Loading your history...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav-bottom py-2">
    <div class="container d-flex justify-content-around">
      <a href="index.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5Z"/>
        </svg>
        Home
      </a>
      <a href="scan.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0v-3Zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5ZM.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5Zm15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5Z"/>
        </svg>
        Scan
      </a>
      <a href="rewards.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M3 2.5a.5.5 0 0 1 .5-.5L4 2l.5.5a.5.5 0 0 1 0 1L4 4l-.5-.5a.5.5 0 0 1-.5-.5zM5 2a.5.5 0 0 1 .5-.5L6 1l.5.5a.5.5 0 0 1 0 1L6 3l-.5-.5a.5.5 0 0 1-.5-.5zM0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H2z"/>
        </svg>
        Rewards
      </a>
      <a href="history.html" class="nav-link active">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8zm15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0z"/>
          <path d="M8.5 4.5a.5.5 0 0 0-1 0v3.31l-2.062 1.375a.5.5 0 1 0 .554.832l2.25-1.5a.5.5 0 0 0 .258-.422V4.5z"/>
        </svg>
        History
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    if (!checkAuth()) throw new Error('unauth');
    setActivePage();

    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MONTH_ICON = '<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>';
    const CHEVRON_DOWN = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/></svg>';

    function getMonthKey(dateStr) {
      const d = new Date(dateStr);
      return isNaN(d.getTime()) ? 'unknown' : d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
    }
    function getMonthLabel(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return 'Other';
      return MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
    }

    async function loadHistory() {
      const res = await apiFetch('/api/users/history');
      if (!res) return;
      const history = await res.json();

      const list = document.getElementById('historyList');
      if (history.length === 0) {
        list.innerHTML = `
          <div class="text-center py-5 px-4">
            <p class="text-muted mb-0">No activity recorded yet. Start recycling to earn points!</p>
          </div>
        `;
        return;
      }

      const byMonth = {};
      history.forEach(h => {
        const key = getMonthKey(h.createdAt);
        if (!byMonth[key]) byMonth[key] = { label: getMonthLabel(h.createdAt), items: [] };
        byMonth[key].items.push(h);
      });
      const sortedMonths = Object.keys(byMonth).sort().reverse();

      list.innerHTML = sortedMonths.map(key => {
        const { label, items } = byMonth[key];
        const itemsHtml = items.map(h => `
          <div class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div>
              <p class="mb-0 fw-bold text-dark">${h.description}</p>
              <p class="x-small text-muted mb-0">${fmtDate(h.createdAt)}</p>
            </div>
            <div class="text-end">
              <span class="badge ${h.type === 'earn' ? 'badge-earn' : 'badge-redeem'} rounded-pill">
                ${h.type === 'earn' ? '+' : '-'}${h.points} pts
              </span>
            </div>
          </div>
        `).join('');
        return `
          <div class="month-section" data-month-key="${key}">
            <div class="month-header collapsed" role="button" tabindex="0" aria-expanded="false" aria-controls="month-items-${key}" id="month-header-${key}">
              <span class="month-icon">${MONTH_ICON}</span>
              <span>${label}</span>
              <span class="month-chevron text-secondary">${CHEVRON_DOWN}</span>
            </div>
            <div class="month-items list-group list-group-flush collapsed" id="month-items-${key}">${itemsHtml}</div>
          </div>
        `;
      }).join('');

      list.querySelectorAll('.month-header').forEach(header => {
        header.addEventListener('click', () => {
          const section = header.closest('.month-section');
          const items = section.querySelector('.month-items');
          const isCollapsed = items.classList.toggle('collapsed');
          header.classList.toggle('collapsed', isCollapsed);
          header.setAttribute('aria-expanded', !isCollapsed);
        });
        header.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            header.click();
          }
        });
      });
    }

    loadHistory();
  </script>
</body>
</html>

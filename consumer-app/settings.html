<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Coca-Cola Rewards</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --coke-red: #F40009; --coke-soft: #fef2f1; --coke-gray: #4a4a4a; }
    body { background: linear-gradient(180deg, var(--coke-soft) 0%, #f5e6e4 100%); padding-bottom: 80px; font-family: 'Quicksand', sans-serif; }
    .nav-bottom { background: #fff; border-top: 2px solid rgba(244,0,9,0.15); position: fixed; bottom: 0; width: 100%; z-index: 1000; }
    .nav-bottom .nav-link { color: #4a4a4a; font-size: 0.75rem; text-align: center; font-weight: 600; }
    .nav-bottom .nav-link.active { color: var(--coke-red); font-weight: 700; }
    .profile-card { border: none; border-radius: 20px; box-shadow: 0 4px 16px rgba(244,0,9,0.08); }
    .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .profile-row:last-child { border-bottom: none; }
    .profile-label { font-size: 0.8rem; color: #6c757d; font-weight: 600; }
    .profile-value { font-size: 0.95rem; font-weight: 700; color: var(--coke-gray); text-align: right; max-width: 60%; }
  </style>
</head>
<body>
  <div class="container-fluid px-4 py-3">
    <div class="d-flex align-items-center mb-4">
      <a href="index.html" class="text-dark me-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
      </a>
      <h5 class="fw-bold mb-0" style="color: var(--coke-gray);">Settings</h5>
    </div>

    <div class="card profile-card p-4 mb-4 bg-white">
      <h6 class="fw-bold mb-3" style="color: var(--coke-gray);">Profile</h6>
      <p class="text-muted small mb-3">Your account info from sign-in and registration.</p>
      <div id="profileContent">
        <div class="text-center py-4">
          <div class="spinner-border spinner-border-sm text-danger" role="status"></div>
          <p class="small text-muted mt-2 mb-0">Loading profile…</p>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav-bottom py-2">
    <div class="container d-flex justify-content-around">
      <a href="index.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293L8.707 1.5Z"/>
        </svg>
        Home
      </a>
      <a href="scan.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0v-3Zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5ZM.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5Zm15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5Z"/>
        </svg>
        Scan
      </a>
      <a href="rewards.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path d="M3 2.5a.5.5 0 0 1 .5-.5L4 2l.5.5a.5.5 0 0 1 0 1L4 4l-.5-.5a.5.5 0 0 1-.5-.5zM5 2a.5.5 0 0 1 .5-.5L6 1l.5.5a.5.5 0 0 1 0 1L6 3l-.5-.5a.5.5 0 0 1-.5-.5zM0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H2z"/>
        </svg>
        Rewards
      </a>
      <a href="history.html" class="nav-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="d-block mx-auto mb-1" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8zm15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0z"/>
          <path d="M8.5 4.5a.5.5 0 0 0-1 0v3.31l-2.062 1.375a.5.5 0 1 0 .554.832l2.25-1.5a.5.5 0 0 0 .258-.422V4.5z"/>
        </svg>
        History
      </a>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    if (!checkAuth()) throw new Error('unauth');
    setActivePage();

    function formatMemberSince(createdAt) {
      if (!createdAt) return '—';
      var d = new Date(createdAt);
      return isNaN(d.getTime()) ? createdAt : d.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    }

    function formatAddress(addr) {
      if (!addr) return '—';
      try {
        var o = typeof addr === 'string' ? JSON.parse(addr) : addr;
        if (o && (o.street || o.city || o.state || o.zip)) {
          var parts = [o.street, o.city, o.state, o.zip].filter(Boolean);
          return parts.length ? parts.join(', ') : '—';
        }
      } catch (e) {}
      return typeof addr === 'string' ? addr : '—';
    }

    function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    async function loadProfile() {
      var res = await apiFetch('/api/users/me');
      var el = document.getElementById('profileContent');
      if (!res || !res.ok) {
        el.innerHTML = '<p class="text-muted small mb-0">Could not load profile.</p>';
        return;
      }
      var u = await res.json();
      el.innerHTML =
        '<div class="profile-row"><span class="profile-label">Name</span><span class="profile-value">' + esc(u.name) + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Email</span><span class="profile-value">' + esc(u.email) + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Age</span><span class="profile-value">' + (u.age != null ? u.age : '—') + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Zip code</span><span class="profile-value">' + esc(u.zipCode) + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Gender</span><span class="profile-value">' + esc(u.gender) + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Shipping address</span><span class="profile-value">' + esc(formatAddress(u.address)) + '</span></div>' +
        '<div class="profile-row"><span class="profile-label">Member since</span><span class="profile-value">' + esc(formatMemberSince(u.createdAt)) + '</span></div>';
    }

    loadProfile();
  </script>
</body>
</html>

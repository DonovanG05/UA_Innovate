<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register — Coca-Cola Rewards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; }
    .register-card { max-width: 420px; margin: 60px auto; }
    .brand-bar { background: #F40009; height: 6px; border-radius: 8px 8px 0 0; }
    .coke-btn { background: #F40009; color: white; border: none; font-weight: bold; }
    .coke-btn:hover { background: #d40008; color: white; }
    .form-control:focus { border-color: #F40009; box-shadow: 0 0 0 0.25rem rgba(244, 0, 9, 0.25); }
  </style>
</head>
<body>
  <div class="register-card px-3">
    <div class="text-center mb-4">
      <h2 class="fw-bold" style="color:#F40009">Coca-Cola</h2>
      <p class="text-muted">Sustainability & Loyalty Rewards</p>
    </div>
    
    <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
      <div class="brand-bar"></div>
      <div class="card-body p-4">
        <h5 class="fw-bold mb-3">Join the Program</h5>
        <p class="small text-muted mb-4">Earn points for every bottle you recycle at our RVM locations.</p>
        <div id="error" class="alert alert-danger py-2 small d-none"></div>
        
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="John Doe" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Create Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="row g-2 mb-4">
            <div class="col-6">
              <label class="form-label small fw-bold">Age</label>
              <input type="number" id="age" class="form-control" placeholder="25" min="13" max="120">
            </div>
            <div class="col-6">
              <label class="form-label small fw-bold">Zip Code</label>
              <input type="text" id="zipCode" class="form-control" placeholder="30301" maxlength="10">
            </div>
          </div>
          <button type="submit" class="btn coke-btn w-100 py-2 mb-3">Create Account</button>
        </form>
        
        <div class="text-center">
          <p class="small text-muted mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-bold" style="color:#F40009">Sign In</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (getToken()) window.location.href = 'index.html';

    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const err = document.getElementById('error');
      
      err.classList.add('d-none');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(`${API}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            age: document.getElementById('age').value ? parseInt(document.getElementById('age').value) : null,
            zipCode: document.getElementById('zipCode').value || null
          })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('userToken', data.token);
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userId', data.userId);
          
          const redir = localStorage.getItem('redirectAfterLogin') || 'index.html';
          localStorage.removeItem('redirectAfterLogin');
          window.location.href = redir;
        } else if (res.status === 409) {
          err.textContent = 'This email is already registered.';
          err.classList.remove('d-none');
        } else {
          err.textContent = 'Registration failed. Please try again.';
          err.classList.remove('d-none');
        }
      } catch (e) {
        err.textContent = 'Connection error. Please try again.';
        err.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Coca-Cola Sustainability</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-card { max-width: 420px; margin: 100px auto; }
    .brand-bar { background: #F40009; height: 6px; border-radius: 4px 4px 0 0; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-bar"></div>
    <div class="card shadow border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <h4 class="fw-bold">Sustainability Dashboard</h4>
          <p class="text-muted small">The Coca-Cola Company — Internal Use Only</p>
        </div>
        <div id="error" class="alert alert-danger d-none"></div>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" id="email" class="form-control" placeholder="admin@coke.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control" required>
          </div>
          <button type="submit" class="btn w-100 text-white fw-bold" style="background:#F40009">
            Sign In
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // If already logged in, go straight to dashboard
    if (getToken()) window.location.href = 'index.html';

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const res = await fetch(`${API}/api/auth/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminName', data.name);
        window.location.href = 'index.html';
      } else {
        const err = document.getElementById('error');
        err.textContent = 'Invalid email or password.';
        err.classList.remove('d-none');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
